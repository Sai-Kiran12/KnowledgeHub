services:
  qdrant:
    image: qdrant/qdrant:v1.13.4
    container_name: rag_qdrant
    volumes:
      - ./backend/data/qdrant:/qdrant/storage
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: rag_backend
    env_file:
      - .env
    ports:
      - '8001:8000'
    volumes:
      - ./backend/data:/app/data
    depends_on:
      - qdrant
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: rag_frontend
    ports:
      - '8502:8501'
    depends_on:
      - backend
    restart: unless-stopped
